<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="grid-sld" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(120,160,220,0.12)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-major-sld" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(120,160,220,0.18)" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="970" height="600" fill="#071226"/>
  <rect width="970" height="600" fill="url(#grid-sld)"/>
  <rect width="970" height="600" fill="url(#grid-major-sld)"/>

  <!-- Drawing border -->
  <rect x="20" y="20" width="930" height="560" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <rect x="30" y="30" width="910" height="540" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <!-- Title top-left -->
  <text x="50" y="60" fill="rgba(200,220,255,0.55)" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10" letter-spacing="3">DWG-EL-001 &#8226; REV B &#8226; AS-BUILT</text>
  <text x="50" y="90" fill="#ffffff" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="20" font-weight="700" letter-spacing="2">SINGLE LINE DIAGRAM</text>
  <text x="50" y="110" fill="rgba(200,220,255,0.7)" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="11" letter-spacing="1">INDUSTRIAL FACILITY / POWER DISTRIBUTION</text>

  <g stroke="#6FB0FF" stroke-width="1.6" fill="none" stroke-linecap="square">

    <!-- Utility source -->
    <line x1="485" y1="155" x2="485" y2="185"/>
    <polygon points="485,150 479,162 491,162" fill="#6FB0FF" stroke="none"/>
    <text x="500" y="162" fill="#ffffff" font-family="ui-monospace,monospace" font-size="11">UTILITY 11 kV</text>
    <text x="500" y="175" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">FAULT: 22 MVA</text>

    <!-- Main breaker -->
    <rect x="470" y="190" width="30" height="30" fill="#071226"/>
    <line x1="474" y1="194" x2="496" y2="216"/>
    <text x="510" y="205" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10">52-M1</text>
    <text x="510" y="218" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">1600 A</text>

    <!-- Transformer -->
    <line x1="485" y1="220" x2="485" y2="240"/>
    <circle cx="485" cy="257" r="17"/>
    <circle cx="485" cy="283" r="17"/>
    <text x="515" y="255" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10">T1</text>
    <text x="515" y="268" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">2500 kVA</text>
    <text x="515" y="281" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">11 kV / 415 V</text>

    <!-- Secondary down to bus -->
    <line x1="485" y1="300" x2="485" y2="335"/>

    <!-- Main bus bar MSB-1 -->
    <line x1="150" y1="335" x2="820" y2="335" stroke-width="3"/>
    <text x="145" y="327" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">MSB-1 / 415 V / 3Ph+N</text>

    <!-- Feeder 1: Motor M-01 -->
    <line x1="200" y1="335" x2="200" y2="385"/>
    <rect x="190" y="385" width="20" height="20" fill="#071226"/>
    <line x1="193" y1="388" x2="207" y2="402"/>
    <line x1="200" y1="405" x2="200" y2="450"/>
    <circle cx="200" cy="470" r="20"/>
    <text x="200" y="476" fill="#6FB0FF" font-family="ui-monospace,monospace" font-size="16" font-weight="700" text-anchor="middle">M</text>
    <text x="200" y="510" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">MOTOR-01</text>
    <text x="200" y="523" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">250 kW</text>

    <!-- Feeder 2: MCC-A -->
    <line x1="330" y1="335" x2="330" y2="385"/>
    <rect x="320" y="385" width="20" height="20" fill="#071226"/>
    <line x1="323" y1="388" x2="337" y2="402"/>
    <line x1="330" y1="405" x2="330" y2="445"/>
    <rect x="300" y="445" width="60" height="40" fill="#071226"/>
    <text x="330" y="470" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">MCC-A</text>
    <text x="330" y="510" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">630 A</text>

    <!-- Feeder 3: Panel PP-1 -->
    <line x1="460" y1="335" x2="460" y2="385"/>
    <rect x="450" y="385" width="20" height="20" fill="#071226"/>
    <line x1="453" y1="388" x2="467" y2="402"/>
    <line x1="460" y1="405" x2="460" y2="445"/>
    <rect x="430" y="445" width="60" height="40" fill="#071226"/>
    <text x="460" y="470" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">PP-1</text>
    <text x="460" y="510" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">400 A</text>

    <!-- Feeder 4: Panel PP-2 -->
    <line x1="590" y1="335" x2="590" y2="385"/>
    <rect x="580" y="385" width="20" height="20" fill="#071226"/>
    <line x1="583" y1="388" x2="597" y2="402"/>
    <line x1="590" y1="405" x2="590" y2="445"/>
    <rect x="560" y="445" width="60" height="40" fill="#071226"/>
    <text x="590" y="470" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">PP-2</text>
    <text x="590" y="510" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">250 A</text>

    <!-- Feeder 5: Spare -->
    <line x1="720" y1="335" x2="720" y2="385"/>
    <rect x="710" y="385" width="20" height="20" fill="#071226" stroke-dasharray="2,2"/>
    <line x1="713" y1="388" x2="727" y2="402" stroke-dasharray="2,2"/>
    <text x="720" y="420" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">SPARE</text>

  </g>

  <!-- Watermark stamp -->
  <g transform="translate(780 140) rotate(-8)">
    <rect x="-60" y="-22" width="120" height="44" fill="none" stroke="#FF6B4A" stroke-width="2"/>
    <text x="0" y="-4" fill="#FF6B4A" font-family="ui-monospace,monospace" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="2">AS-BUILT</text>
    <text x="0" y="13" fill="#FF6B4A" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" letter-spacing="1">VERIFIED 2025</text>
  </g>

  <!-- Title block bottom-right -->
  <g>
    <rect x="700" y="505" width="240" height="60" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="700" y1="525" x2="940" y2="525" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <line x1="820" y1="505" x2="820" y2="565" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <text x="710" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">PROJECT</text>
    <text x="825" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">DRAWING No.</text>
    <text x="710" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">WA-MINE-2405</text>
    <text x="825" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">EL-001 / B</text>
    <text x="710" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">ADVANCED MECHANIX</text>
    <text x="825" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">SHEET 1 / 12</text>
  </g>

  <!-- Confidential hatch -->
  <text x="50" y="558" fill="rgba(200,220,255,0.4)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="2">&#8212; CONFIDENTIAL &#8226; CLIENT DRAWING REDACTED &#8212;</text>
</svg>
