<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="grid-pv" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(120,160,220,0.12)" stroke-width="0.5"/>
    </pattern>
    <pattern id="pv-module" width="18" height="28" patternUnits="userSpaceOnUse">
      <rect width="18" height="28" fill="#0E2950" stroke="#6FB0FF" stroke-width="0.7"/>
      <line x1="0" y1="14" x2="18" y2="14" stroke="#6FB0FF" stroke-width="0.3"/>
      <line x1="9" y1="0" x2="9" y2="28" stroke="#6FB0FF" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="970" height="600" fill="#071226"/>
  <rect width="970" height="600" fill="url(#grid-pv)"/>
  <rect x="20" y="20" width="930" height="560" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <rect x="30" y="30" width="910" height="540" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <text x="50" y="60" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="10" letter-spacing="3">DWG-PV-022 &#8226; REV A &#8226; AHJ PERMIT SET</text>
  <text x="50" y="90" fill="#ffffff" font-family="ui-monospace,monospace" font-size="20" font-weight="700" letter-spacing="2">PV SYSTEM LAYOUT &amp; SLD</text>
  <text x="50" y="110" fill="rgba(200,220,255,0.7)" font-family="ui-monospace,monospace" font-size="11" letter-spacing="1">COMMERCIAL ROOF-MOUNT &#8212; 480 kW DC</text>

  <!-- Roof plan / array -->
  <g>
    <rect x="50" y="145" width="440" height="240" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="55" y="160" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1">ROOF PLAN &#8212; NTS</text>

    <!-- Array sub-blocks -->
    <rect x="70" y="175" width="180" height="90" fill="url(#pv-module)"/>
    <rect x="260" y="175" width="180" height="90" fill="url(#pv-module)"/>
    <rect x="70" y="275" width="180" height="90" fill="url(#pv-module)"/>
    <rect x="260" y="275" width="180" height="90" fill="url(#pv-module)"/>

    <!-- Array labels -->
    <text x="160" y="224" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle" font-weight="700">ARRAY A1</text>
    <text x="160" y="237" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">22 x 545W</text>
    <text x="350" y="224" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle" font-weight="700">ARRAY A2</text>
    <text x="350" y="237" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">22 x 545W</text>
    <text x="160" y="324" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle" font-weight="700">ARRAY A3</text>
    <text x="160" y="337" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">22 x 545W</text>
    <text x="350" y="324" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle" font-weight="700">ARRAY A4</text>
    <text x="350" y="337" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">22 x 545W</text>

    <!-- North arrow -->
    <g transform="translate(460 165)">
      <circle r="14" fill="#071226" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
      <polygon points="0,-10 -5,6 0,2 5,6" fill="#6FB0FF"/>
      <text x="0" y="-16" fill="#ffffff" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" font-weight="700">N</text>
    </g>

    <!-- Setbacks dimension -->
    <g stroke="rgba(200,220,255,0.5)" stroke-width="0.6" fill="none">
      <line x1="50" y1="405" x2="250" y2="405"/>
      <line x1="50" y1="400" x2="50" y2="410"/>
      <line x1="250" y1="400" x2="250" y2="410"/>
      <text x="150" y="420" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">42.0' ARRAY WIDTH</text>
    </g>
  </g>

  <!-- Single line diagram (right side) -->
  <g>
    <rect x="520" y="145" width="410" height="380" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="525" y="160" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1">SINGLE LINE DIAGRAM</text>

    <g stroke="#6FB0FF" stroke-width="1.4" fill="none" stroke-linecap="square">
      <!-- PV arrays -->
      <rect x="545" y="180" width="80" height="40" fill="#0E2950"/>
      <text x="585" y="198" fill="#ffffff" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">A1+A2</text>
      <text x="585" y="212" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">240 kW DC</text>

      <rect x="545" y="240" width="80" height="40" fill="#0E2950"/>
      <text x="585" y="258" fill="#ffffff" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">A3+A4</text>
      <text x="585" y="272" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">240 kW DC</text>

      <!-- Strings to combiner -->
      <line x1="625" y1="200" x2="680" y2="200"/>
      <line x1="625" y1="260" x2="680" y2="260"/>

      <!-- DC combiner -->
      <rect x="680" y="185" width="50" height="90" fill="#071226"/>
      <text x="705" y="225" fill="#ffffff" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">DC</text>
      <text x="705" y="238" fill="#ffffff" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">COMB</text>
      <text x="705" y="254" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">1000 VDC</text>

      <!-- Inverter -->
      <line x1="730" y1="230" x2="770" y2="230"/>
      <rect x="770" y="195" width="80" height="70" fill="#071226"/>
      <text x="810" y="220" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle" font-weight="700">INV-01</text>
      <text x="810" y="235" fill="rgba(200,220,255,0.65)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">STRING INV</text>
      <text x="810" y="250" fill="rgba(200,220,255,0.65)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">400 kW AC</text>

      <!-- AC output -->
      <line x1="810" y1="265" x2="810" y2="300"/>
      <rect x="795" y="300" width="30" height="24" fill="#071226"/>
      <line x1="799" y1="304" x2="821" y2="320"/>
      <text x="840" y="315" fill="#ffffff" font-family="ui-monospace,monospace" font-size="9">AC DISC</text>

      <!-- Meter -->
      <line x1="810" y1="324" x2="810" y2="350"/>
      <circle cx="810" cy="365" r="14"/>
      <text x="810" y="370" fill="#6FB0FF" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle" font-weight="700">kWh</text>
      <text x="840" y="370" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9">NET METER</text>

      <!-- PCC -->
      <line x1="810" y1="379" x2="810" y2="415"/>
      <line x1="760" y1="415" x2="860" y2="415" stroke-width="3"/>
      <text x="760" y="407" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9">POINT OF COMMON COUPLING</text>

      <!-- Utility -->
      <line x1="810" y1="415" x2="810" y2="450"/>
      <polygon points="810,460 805,448 815,448" fill="#6FB0FF" stroke="none"/>
      <text x="755" y="480" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10">UTILITY GRID</text>
      <text x="755" y="494" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="8">480Y/277V 3Ph</text>
    </g>
  </g>

  <!-- Code compliance tags -->
  <g font-family="ui-monospace,monospace" font-size="8" fill="rgba(200,220,255,0.65)">
    <rect x="50" y="445" width="440" height="80" fill="#0E2950" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="60" y="462" letter-spacing="1" fill="rgba(200,220,255,0.55)">CODE COMPLIANCE</text>
    <text x="60" y="482" fill="#ffffff">&#10004; NEC 2023 ART. 690 (PV SYSTEMS)</text>
    <text x="60" y="498" fill="#ffffff">&#10004; IEEE 1547 INTERCONNECTION</text>
    <text x="60" y="514" fill="#ffffff">&#10004; UL 1741 SA INVERTER</text>
    <text x="280" y="482" fill="#ffffff">&#10004; IBC 2021 STRUCTURAL</text>
    <text x="280" y="498" fill="#ffffff">&#10004; ASCE 7-22 WIND LOADS</text>
    <text x="280" y="514" fill="#ffffff">&#10004; AHJ PERMIT READY</text>
  </g>

  <!-- Stamp -->
  <g transform="translate(720 100) rotate(-6)">
    <rect x="-68" y="-20" width="136" height="40" fill="none" stroke="#FFB43A" stroke-width="2"/>
    <text x="0" y="-3" fill="#FFB43A" font-family="ui-monospace,monospace" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="2">PERMIT SET</text>
    <text x="0" y="11" fill="#FFB43A" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" letter-spacing="1">AHJ READY</text>
  </g>

  <!-- Title block -->
  <g>
    <rect x="700" y="505" width="240" height="60" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="700" y1="525" x2="940" y2="525" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <line x1="820" y1="505" x2="820" y2="565" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <text x="710" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">PROJECT</text>
    <text x="825" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">DRAWING No.</text>
    <text x="710" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">SD-COMM-2509</text>
    <text x="825" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">PV-022 / A</text>
    <text x="710" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">ADVANCED MECHANIX</text>
    <text x="825" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">SHEET 3 / 14</text>
  </g>

  <text x="50" y="558" fill="rgba(200,220,255,0.4)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="2">&#8212; CONFIDENTIAL &#8226; CLIENT DRAWING REDACTED &#8212;</text>
</svg>
