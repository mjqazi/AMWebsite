<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="grid-rd" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(120,160,220,0.12)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="970" height="600" fill="#071226"/>
  <rect width="970" height="600" fill="url(#grid-rd)"/>
  <rect x="20" y="20" width="930" height="560" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <rect x="30" y="30" width="910" height="540" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <text x="50" y="60" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="10" letter-spacing="3">DWG-EL-007 &#8226; REV A &#8226; FOR CONSTRUCTION</text>
  <text x="50" y="90" fill="#ffffff" font-family="ui-monospace,monospace" font-size="20" font-weight="700" letter-spacing="2">ELECTRICAL RISER DIAGRAM</text>
  <text x="50" y="110" fill="rgba(200,220,255,0.7)" font-family="ui-monospace,monospace" font-size="11" letter-spacing="1">COMMERCIAL HIGH-RISE &#8212; 12 FLOORS + BASEMENT</text>

  <g stroke="#6FB0FF" stroke-width="1.4" fill="none" stroke-linecap="square">
    <!-- Building outline -->
    <rect x="250" y="150" width="380" height="390" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

    <!-- Floor lines (ground to level 12) -->
    <line x1="250" y1="180" x2="630" y2="180" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="210" x2="630" y2="210" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="240" x2="630" y2="240" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="270" x2="630" y2="270" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="300" x2="630" y2="300" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="330" x2="630" y2="330" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="360" x2="630" y2="360" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="390" x2="630" y2="390" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="420" x2="630" y2="420" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="450" x2="630" y2="450" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="480" x2="630" y2="480" stroke="rgba(255,255,255,0.22)"/>
    <line x1="250" y1="510" x2="630" y2="510" stroke="rgba(255,255,255,0.22)"/>

    <!-- Main riser (left) -->
    <line x1="310" y1="160" x2="310" y2="530" stroke-width="3"/>
    <!-- Secondary riser (right) -->
    <line x1="570" y1="160" x2="570" y2="530" stroke-width="2.5"/>
  </g>

  <!-- Floor labels + panels -->
  <g font-family="ui-monospace,monospace" font-size="9" fill="rgba(200,220,255,0.7)">
    <text x="240" y="170" text-anchor="end">ROOF</text>
    <text x="240" y="200" text-anchor="end">L12</text>
    <text x="240" y="230" text-anchor="end">L11</text>
    <text x="240" y="260" text-anchor="end">L10</text>
    <text x="240" y="290" text-anchor="end">L09</text>
    <text x="240" y="320" text-anchor="end">L08</text>
    <text x="240" y="350" text-anchor="end">L07</text>
    <text x="240" y="380" text-anchor="end">L06</text>
    <text x="240" y="410" text-anchor="end">L05</text>
    <text x="240" y="440" text-anchor="end">L04</text>
    <text x="240" y="470" text-anchor="end">L03</text>
    <text x="240" y="500" text-anchor="end">L02</text>
    <text x="240" y="530" text-anchor="end">L01 / GF</text>
  </g>

  <!-- Floor panels on both risers -->
  <g fill="#071226" stroke="#6FB0FF" stroke-width="1.2">
    <rect x="320" y="195" width="28" height="14"/>
    <rect x="320" y="255" width="28" height="14"/>
    <rect x="320" y="315" width="28" height="14"/>
    <rect x="320" y="375" width="28" height="14"/>
    <rect x="320" y="435" width="28" height="14"/>
    <rect x="320" y="495" width="28" height="14"/>
    <rect x="580" y="195" width="28" height="14"/>
    <rect x="580" y="255" width="28" height="14"/>
    <rect x="580" y="315" width="28" height="14"/>
    <rect x="580" y="375" width="28" height="14"/>
    <rect x="580" y="435" width="28" height="14"/>
    <rect x="580" y="495" width="28" height="14"/>
  </g>

  <!-- Panel labels -->
  <g font-family="ui-monospace,monospace" font-size="7" fill="rgba(200,220,255,0.75)" text-anchor="middle">
    <text x="334" y="205">DP-12</text>
    <text x="334" y="265">DP-10</text>
    <text x="334" y="325">DP-08</text>
    <text x="334" y="385">DP-06</text>
    <text x="334" y="445">DP-04</text>
    <text x="334" y="505">DP-02</text>
    <text x="594" y="205">LP-12</text>
    <text x="594" y="265">LP-10</text>
    <text x="594" y="325">LP-08</text>
    <text x="594" y="385">LP-06</text>
    <text x="594" y="445">LP-04</text>
    <text x="594" y="505">LP-02</text>
  </g>

  <!-- MDP / Ground -->
  <g stroke="#6FB0FF" stroke-width="1.4" fill="#071226">
    <rect x="370" y="545" width="140" height="22"/>
    <text x="440" y="560" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">MDP / MAIN SWITCHBOARD</text>
  </g>
  <line x1="310" y1="530" x2="370" y2="555" stroke="#6FB0FF" stroke-width="1.4" fill="none"/>
  <line x1="570" y1="530" x2="510" y2="555" stroke="#6FB0FF" stroke-width="1.4" fill="none"/>

  <!-- UPS / Generator callouts -->
  <g stroke="#6FB0FF" stroke-width="1.2" fill="none">
    <line x1="250" y1="170" x2="150" y2="170"/>
    <rect x="80" y="158" width="70" height="24" fill="#071226"/>
    <text x="115" y="174" font-family="ui-monospace,monospace" font-size="9" fill="#ffffff" text-anchor="middle">ROOF GEN</text>

    <line x1="630" y1="545" x2="760" y2="545"/>
    <rect x="760" y="530" width="80" height="30" fill="#071226"/>
    <text x="800" y="540" font-family="ui-monospace,monospace" font-size="8" fill="rgba(200,220,255,0.7)" text-anchor="middle">UPS-01</text>
    <text x="800" y="553" font-family="ui-monospace,monospace" font-size="8" fill="#ffffff" text-anchor="middle">80 kVA</text>
  </g>

  <!-- Notes column -->
  <g font-family="ui-monospace,monospace" font-size="9">
    <text x="680" y="180" fill="rgba(200,220,255,0.55)" letter-spacing="1">LEGEND</text>
    <text x="680" y="200" fill="#ffffff">DP &#8212; DISTRIBUTION PANEL</text>
    <text x="680" y="215" fill="#ffffff">LP &#8212; LIGHTING PANEL</text>
    <text x="680" y="230" fill="#ffffff">MDP &#8212; MAIN DISTRIBUTION</text>
    <text x="680" y="245" fill="#ffffff">UPS &#8212; UNINTERRUPTED SUPPLY</text>

    <text x="680" y="295" fill="rgba(200,220,255,0.55)" letter-spacing="1">STANDARDS</text>
    <text x="680" y="315" fill="#ffffff">NEC 2023 COMPLIANT</text>
    <text x="680" y="330" fill="#ffffff">IEC 60364-7</text>
    <text x="680" y="345" fill="#ffffff">NFPA 70E ARC FLASH</text>

    <text x="680" y="395" fill="rgba(200,220,255,0.55)" letter-spacing="1">LOADS</text>
    <text x="680" y="415" fill="#ffffff">MAIN: 1200 A / 480Y/277V</text>
    <text x="680" y="430" fill="#ffffff">EMERGENCY: 400 A</text>
  </g>

  <!-- Title block bottom-right -->
  <g>
    <rect x="700" y="505" width="240" height="60" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="700" y1="525" x2="940" y2="525" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <line x1="820" y1="505" x2="820" y2="565" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <text x="710" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">PROJECT</text>
    <text x="825" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">DRAWING No.</text>
    <text x="710" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">HR-CBD-2503</text>
    <text x="825" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">EL-007 / A</text>
    <text x="710" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">ADVANCED MECHANIX</text>
    <text x="825" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">SHEET 7 / 24</text>
  </g>

  <text x="50" y="558" fill="rgba(200,220,255,0.4)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="2">&#8212; CONFIDENTIAL &#8226; CLIENT DRAWING REDACTED &#8212;</text>
</svg>
