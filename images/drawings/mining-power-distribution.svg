<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="grid-mp" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(120,160,220,0.12)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="970" height="600" fill="#071226"/>
  <rect width="970" height="600" fill="url(#grid-mp)"/>
  <rect x="20" y="20" width="930" height="560" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <rect x="30" y="30" width="910" height="540" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <text x="50" y="60" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="10" letter-spacing="3">DWG-MP-014 &#8226; REV C &#8226; ISSUED FOR REVIEW</text>
  <text x="50" y="90" fill="#ffffff" font-family="ui-monospace,monospace" font-size="20" font-weight="700" letter-spacing="2">MINE POWER DISTRIBUTION</text>
  <text x="50" y="110" fill="rgba(200,220,255,0.7)" font-family="ui-monospace,monospace" font-size="11" letter-spacing="1">SUBSTATION TO PROCESS LOADS &#8212; 132/11 kV</text>

  <g stroke="#6FB0FF" stroke-width="1.5" fill="none" stroke-linecap="square">
    <!-- HV incoming -->
    <line x1="90" y1="200" x2="90" y2="240"/>
    <polygon points="90,195 84,207 96,207" fill="#6FB0FF" stroke="none"/>
    <text x="100" y="210" fill="#ffffff" font-family="ui-monospace,monospace" font-size="11">GRID 132 kV</text>
    <text x="100" y="224" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">60 Hz / 3Ph</text>

    <!-- HV breaker -->
    <rect x="78" y="245" width="24" height="24" fill="#071226"/>
    <line x1="81" y1="248" x2="99" y2="266"/>

    <!-- Step-down transformer -->
    <line x1="90" y1="269" x2="90" y2="290"/>
    <circle cx="90" cy="305" r="15"/>
    <circle cx="90" cy="328" r="15"/>
    <text x="115" y="310" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10">TR-1</text>
    <text x="115" y="323" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">25 MVA</text>
    <text x="115" y="336" fill="rgba(200,220,255,0.55)" font-family="ui-monospace,monospace" font-size="9">132/11 kV</text>

    <!-- 11kV bus -->
    <line x1="90" y1="343" x2="90" y2="380"/>
    <line x1="90" y1="380" x2="870" y2="380" stroke-width="3"/>
    <text x="85" y="372" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="10">SWGR-A / 11 kV</text>

    <!-- Feeder A: Winder -->
    <line x1="180" y1="380" x2="180" y2="420"/>
    <rect x="170" y="420" width="20" height="20" fill="#071226"/>
    <line x1="173" y1="423" x2="187" y2="437"/>
    <line x1="180" y1="440" x2="180" y2="475"/>
    <circle cx="180" cy="495" r="20"/>
    <text x="180" y="501" fill="#6FB0FF" font-family="ui-monospace,monospace" font-size="16" font-weight="700" text-anchor="middle">M</text>
    <text x="180" y="535" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">HOIST WINDER</text>
    <text x="180" y="548" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">3.2 MW</text>

    <!-- Feeder B: Crusher -->
    <line x1="310" y1="380" x2="310" y2="420"/>
    <rect x="300" y="420" width="20" height="20" fill="#071226"/>
    <line x1="303" y1="423" x2="317" y2="437"/>
    <line x1="310" y1="440" x2="310" y2="475"/>
    <circle cx="310" cy="495" r="20"/>
    <text x="310" y="501" fill="#6FB0FF" font-family="ui-monospace,monospace" font-size="16" font-weight="700" text-anchor="middle">M</text>
    <text x="310" y="535" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">PRIMARY CRUSHER</text>
    <text x="310" y="548" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">1.8 MW</text>

    <!-- Feeder C: SAG Mill -->
    <line x1="440" y1="380" x2="440" y2="420"/>
    <rect x="430" y="420" width="20" height="20" fill="#071226"/>
    <line x1="433" y1="423" x2="447" y2="437"/>
    <line x1="440" y1="440" x2="440" y2="475"/>
    <circle cx="440" cy="495" r="20"/>
    <text x="440" y="501" fill="#6FB0FF" font-family="ui-monospace,monospace" font-size="16" font-weight="700" text-anchor="middle">M</text>
    <text x="440" y="535" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">SAG MILL</text>
    <text x="440" y="548" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">8.5 MW</text>

    <!-- Feeder D: Ventilation fans via TR2 -->
    <line x1="570" y1="380" x2="570" y2="415"/>
    <rect x="560" y="415" width="20" height="20" fill="#071226"/>
    <line x1="563" y1="418" x2="577" y2="432"/>
    <line x1="570" y1="435" x2="570" y2="455"/>
    <circle cx="570" cy="470" r="12"/>
    <circle cx="570" cy="488" r="12"/>
    <text x="593" y="475" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9">TR-2</text>
    <text x="593" y="488" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8">11/3.3 kV</text>
    <line x1="570" y1="500" x2="570" y2="520"/>
    <line x1="540" y1="520" x2="600" y2="520" stroke-width="2"/>
    <text x="570" y="540" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">VENT FANS</text>
    <text x="570" y="553" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">4 &times; 450 kW</text>

    <!-- Feeder E: Process Plant -->
    <line x1="700" y1="380" x2="700" y2="415"/>
    <rect x="690" y="415" width="20" height="20" fill="#071226"/>
    <line x1="693" y1="418" x2="707" y2="432"/>
    <line x1="700" y1="435" x2="700" y2="460"/>
    <rect x="660" y="460" width="80" height="46" fill="#071226"/>
    <text x="700" y="482" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">MCC-PROC</text>
    <text x="700" y="498" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle">1250 kW</text>
    <text x="700" y="525" fill="rgba(200,220,255,0.75)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">PROCESS PLANT</text>

    <!-- Feeder F: Spare -->
    <line x1="820" y1="380" x2="820" y2="415" stroke-dasharray="3,3"/>
    <rect x="810" y="415" width="20" height="20" fill="#071226" stroke-dasharray="2,2"/>
    <line x1="813" y1="418" x2="827" y2="432" stroke-dasharray="2,2"/>
    <text x="820" y="455" fill="rgba(200,220,255,0.45)" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">SPARE</text>
  </g>

  <!-- Stamp -->
  <g transform="translate(805 165) rotate(-6)">
    <rect x="-68" y="-22" width="136" height="44" fill="none" stroke="#62E0B0" stroke-width="2"/>
    <text x="0" y="-4" fill="#62E0B0" font-family="ui-monospace,monospace" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="2">APPROVED</text>
    <text x="0" y="13" fill="#62E0B0" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" letter-spacing="1">CHIEF ENGINEER</text>
  </g>

  <!-- Title block -->
  <g>
    <rect x="700" y="505" width="240" height="60" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <line x1="700" y1="525" x2="940" y2="525" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <line x1="820" y1="505" x2="820" y2="565" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <text x="710" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">PROJECT</text>
    <text x="825" y="518" fill="rgba(200,220,255,0.5)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="1">DRAWING No.</text>
    <text x="710" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">PILBARA-MP-24</text>
    <text x="825" y="542" fill="#ffffff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">MP-014 / C</text>
    <text x="710" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">ADVANCED MECHANIX</text>
    <text x="825" y="558" fill="rgba(200,220,255,0.6)" font-family="ui-monospace,monospace" font-size="8">SHEET 14 / 48</text>
  </g>

  <text x="50" y="558" fill="rgba(200,220,255,0.4)" font-family="ui-monospace,monospace" font-size="8" letter-spacing="2">&#8212; CONFIDENTIAL &#8226; CLIENT DRAWING REDACTED &#8212;</text>
</svg>
